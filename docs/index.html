<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inputto Firestore</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <script type="module" crossorigin src="./assets/index-BLd9V8i3.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DFVW5WYa.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Firestore Free-Tier Friendly</p>
          <h1>工事データ登録/編集</h1>
          <p class="subtle">工事ごとに必要な手配書と符号だけを読み込み、Firestore の読み取りを絞る構成です。</p>
        </div>
        <div class="topbar-actions">
          <label class="inline-field">
            <span>作業者</span>
            <input id="operatorNameInput" type="text" placeholder="例: 高林">
          </label>
        </div>
      </header>

      <section class="status-row">
        <div class="status-pill" id="busyState">待機中</div>
        <div class="status-text" id="statusText">Firestore 接続待ち</div>
      </section>

      <main class="layout">
        <section class="panel stack-lg">
          <div class="section-head">
            <div>
              <h2>工事</h2>
              <p class="subtle">工事を選ぶと手配書一覧だけ読み込みます。</p>
            </div>
            <div class="cluster">
              <button id="refreshProjectsButton" type="button" class="ghost-button">
                <span class="material-symbols-outlined">refresh</span>
                <span>更新</span>
              </button>
              <button id="newProjectButton" type="button" class="ghost-button">
                <span class="material-symbols-outlined">add</span>
                <span>新規工事</span>
              </button>
              <button id="saveButton" type="button" class="primary-button">
                <span class="material-symbols-outlined">save</span>
                <span>保存</span>
              </button>
            </div>
          </div>

          <label class="field">
            <span>候補</span>
            <select id="projectSelect">
              <option value="">工事を選択</option>
            </select>
          </label>

          <div class="grid-2">
            <label class="field">
              <span>工事番号</span>
              <input id="projectC2Input" type="text" placeholder="例: 63074">
            </label>
            <label class="field">
              <span>担当</span>
              <input id="projectContactInput" type="text" placeholder="例: 高林">
            </label>
            <label class="field field-span-2">
              <span>現場名</span>
              <input id="projectNameInput" type="text" placeholder="正式名">
            </label>
            <label class="field field-span-2">
              <span>略称</span>
              <input id="projectShortNameInput" type="text" placeholder="ラベル用の短い名前">
            </label>
          </div>

          <div class="section-head">
            <div>
              <h2>手配書</h2>
              <p class="subtle">手配書Noを入れて読込。登録済みならその内容を開き、未登録ならそのまま新規入力できます。</p>
            </div>
            <div class="cluster">
              <button id="loadDrawingButton" type="button" class="tonal-button">
                <span class="material-symbols-outlined">folder_open</span>
                <span>手配書を読込</span>
              </button>
            </div>
          </div>

          <div class="grid-2">
            <label class="field">
              <span>手配書No</span>
              <input id="drawingNumberInput" type="text" placeholder="例: 3">
            </label>
            <label class="field">
              <span>手配書状態</span>
              <input id="drawingStatusInput" type="text" placeholder="例: 外部">
            </label>
          </div>

          <div class="drawing-tabs" id="drawingTabs"></div>

          <div class="section-head">
            <div>
              <h2>符号データ</h2>
              <p class="subtle">1符号 = 1ドキュメント。保存は開いている手配書分だけ差分反映します。</p>
            </div>
            <div class="cluster">
              <label class="inline-field inline-field-compact">
                <span>絞込</span>
                <input id="filterInput" type="text" placeholder="符号 / 品名 / フロア">
              </label>
              <button id="addRowButton" type="button" class="ghost-button">
                <span class="material-symbols-outlined">add_row_below</span>
                <span>行追加</span>
              </button>
              <button id="duplicateRowButton" type="button" class="ghost-button">
                <span class="material-symbols-outlined">content_copy</span>
                <span>複製</span>
              </button>
              <button id="deleteRowsButton" type="button" class="danger-button">
                <span class="material-symbols-outlined">delete</span>
                <span>選択削除</span>
              </button>
            </div>
          </div>

          <div class="table-wrap">
            <table class="data-table">
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </section>

        <aside class="panel stack-lg">
          <div class="section-head">
            <div>
              <h2>ラベルプレビュー</h2>
              <p class="subtle">略称を必ず使い、焼付色を3行目に出します。</p>
            </div>
            <button id="printButton" type="button" class="ghost-button">
              <span class="material-symbols-outlined">print</span>
              <span>印刷</span>
            </button>
          </div>

          <div class="summary-grid">
            <div class="summary-card">
              <span class="summary-label">工事</span>
              <strong id="summaryProject">-</strong>
            </div>
            <div class="summary-card">
              <span class="summary-label">手配書</span>
              <strong id="summaryDrawing">-</strong>
            </div>
            <div class="summary-card">
              <span class="summary-label">符号数</span>
              <strong id="summaryRows">0件</strong>
            </div>
            <div class="summary-card">
              <span class="summary-label">ラベル枚数</span>
              <strong id="summaryLabels">0枚</strong>
            </div>
          </div>

          <div class="label-pages" id="labelPages"></div>
        </aside>
      </main>
    </div>
  </body>
</html>
